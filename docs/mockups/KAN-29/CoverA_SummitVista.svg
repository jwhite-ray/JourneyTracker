<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2160" width="1080" height="2160">
<!--
  KAN-29 · Cover concept A — "Summit Vista"
  One-line rationale: the WHOLE JOURNEY is the hero — layered faceted ranges recede
  to a snow-capped Ember Spire lit by a reward-gold aura, with a dot-dash trek path
  winding up from the foreground and a tiny Wren already on his way. Title reads as
  a calm masthead above the vista. Prioritizes SCALE OF THE WORLD over the character.

  Token → hex map used below (static SVG asset; no runtime token binding possible,
  see docs/DESIGN_SYSTEM.md §02/§07 for the source tokens this traces to):
    bg/parchment #E8DEC0 · surface/card #F4EEDD · ink #37342B · accent/primary #5B8A4B
    accent/reward #D6A64B (+ derived tints #E6BE6E / #B3853A)
    char/cloak #5F6B4D (+ #74815F / #4A543C) · char/skin #D8B58C (+ #E6CBA6 / #BE9A6E)
    char/hair #8B5A34 (+ #A47245 / #714526)
    terrain/stone #8C8574 (+ derived #A6A08D / #6E6658, plus a lightened "distant"
      tint #B7B29D / #C9C4B0 / #9B9683 for the back range, and a darkened "near"
      tint #6E6656 / #857C69 / #504A3D for the front range — atmospheric-perspective
      tints of the one terrain/stone hue, same spirit as the §07.3.5 ocean depth
      bands, not a new material)
    terrain/snow #EDE8DC (+ #F7F4EC / #D9D2C0) · terrain/forest #3F6B3C (+ #4F7F4B / #2E4F2B)
    terrain/grass #9CAD5E (flat wash, foreground ground)

  Simplifications for cover scale (documented, not silent): the scatter density in
  §07.4 (30–50 conifers/forest) is thinned to a legible cluster here; distant-range
  triangles skip the individual hard offset shadow (the lightened flat tint already
  reads as "far/hazy") while Ember Spire and the front range keep it per §07.1;
  the on-path Wren is a simplified small-scale silhouette (cloak + hair + feet),
  omitting eyes/brows that would be sub-pixel noise at ~90px — full rig lives in
  WrenMarker.swift for on-screen map use.
-->

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4EEDD"/>
    <stop offset="55%" stop-color="#EDE0B8"/>
    <stop offset="100%" stop-color="#E8C888"/>
  </linearGradient>
</defs>

<!-- Sky -->
<rect x="0" y="0" width="1080" height="1180" fill="url(#sky)"/>
<!-- Ground base, sits behind the mountains' feet and the foreground mound -->
<rect x="0" y="1000" width="1080" height="1160" fill="#DCCB9C"/>

<!-- Reward-gold aura behind Ember Spire (flat opacity steps, never a gradient) -->
<circle cx="540" cy="760" r="270" fill="#D6A64B" opacity="0.14"/>
<circle cx="540" cy="760" r="205" fill="#D6A64B" opacity="0.22"/>
<circle cx="540" cy="760" r="145" fill="#D6A64B" opacity="0.32"/>
<circle cx="540" cy="760" r="90"  fill="#D6A64B" opacity="0.5"/>

