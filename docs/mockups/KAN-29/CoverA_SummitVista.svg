     flagship journey), ink stroke, card-colored center dot, reward emphasis ring,
     Cinzel-register chip that always shows for the destination. -->
<g>
  <circle cx="540" cy="1000" r="34" fill="none" stroke="#D6A64B" stroke-width="6"/>
  <path d="M540 1050 C 540 1050 508 1020 508 998 A32 32 0 1 1 572 998 C 572 1020 540 1050 540 1050 Z"
        fill="#37342B" transform="translate(4,5)"/>
  <path d="M540 1050 C 540 1050 508 1020 508 998 A32 32 0 1 1 572 998 C 572 1020 540 1050 540 1050 Z"
        fill="#5B8A4B" stroke="#37342B" stroke-width="3"/>
