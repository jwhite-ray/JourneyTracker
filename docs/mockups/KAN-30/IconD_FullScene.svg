<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
<!--
  KAN-30 · App icon Direction D — "Full Scene," a square recomposition of the
  approved Cover D (Mockups/CoverD_Composite.svg), testing how the whole cover
  illustration (not just the peak) holds up at icon size.

  Same three bands as Cover D, rebalanced from portrait (1080x2160) into a
  1024x1024 square: the "JourneyTracker" wordmark + hand-drawn dot-dash trail
  weave across the TOP; the mountain vista (back range, Ember Spire snow-capped,
  gold aura, mid range flanking peaks, the unnamed green waypoint pin peeking
  from the Spire's upper-left) across the MIDDLE; Wren standing centered on his
  grass at the BOTTOM, with the trek path connecting mountain to Wren. Every
  shape group below is Cover D's ACTUAL geometry, copied verbatim and wrapped in
  a single translate+scale transform per band (no coordinates hand-edited
  inside a reused group) — see the three band comments for the exact transforms
  and the anchor math (all three bands share the x=540(old) -> x=512(new,
  square-center) horizontal anchor).

  Full-bleed square, no transparency, no rounded corners (iOS masks corners).
  Key content (wordmark, mountains, Wren) sits within the middle ~85% safe
  center (x/y ~77-947 of 1024); only environmental bleed (mid-range peak tips,
  the grass-wash texture, the drop shadow) is allowed past that line, same
  convention as IconA/B/C.

  Per-band transform math (old Cover D coords -> new square coords):
    Title  (weave + wordmark, tagline DROPPED per brief):
      translate(53,-17) scale(0.85)         — anchor old (540,~190) -> (512,~145)
    Mountains (aura, back range, hidden trek stub, waypoint pin, Ember Spire,
      mid range — Cover D's own inner translate(0,-140) / translate(-88,78)
      groups are kept nested UNCHANGED inside this outer wrap):
      translate(-38.8,8.4) scale(1.02,0.68) — anchor old (540,620) -> (512,430)
      Non-uniform scale is deliberate — "spread the mountains a touch wider"
      means x is barely compressed (1.02, i.e. very slightly widened) while y
      is compressed hard (0.68) to fit the shorter square band; this also lets
      the mid-range peak tips bleed a few px past the left/right edges, which
      reads as panoramic rather than cramped.
    Wren (character rig + grass wash, verbatim from Cover D/B):
      translate(198.8,-121.7) scale(0.58)   — anchor old feet-bottom (540,1856)
      -> new feet-bottom (512,955), uniform scale only (character rigs never
      get stretched non-uniformly).

  COMPROMISE (disclosed, not silent): the long switchback trek path that
  visually connects the mountain band to Wren spans BOTH bands, which use two
  different scale factors (0.68 vertical for mountains vs. 0.58 for Wren) — a
  single reused path can't satisfy two different transforms at once. That one
  path (only) is hand-redrawn below, same stroke recipe (ink, 3pt, round cap,
  8/6 dash) and similar switchback character to Cover D's, but with new control
  points chosen to start exactly where the mountain band's hidden occluded stub
  exits from behind Ember Spire, and end at Wren's (rescaled) collar. Everything
  else — every filled shape — is Cover D's real geometry, untouched.

  Token -> hex map (see docs/DESIGN_SYSTEM.md §02/§04/§07/§09; static SVG can't
  bind runtime tokens):
    bg/parchment #E8DEC0 · surface/card #F4EEDD · ink #37342B
    accent/primary #5B8A4B · accent/reward #D6A64B
    char/cloak #5F6B4D (+ #74815F / #4A543C) · char/skin #D8B58C (+ #E6CBA6 / #BE9A6E)
    char/hair #8B5A34 (+ #A47245)
    terrain/stone #8C8574, back-range tint #C9C4B0 / #9B9683, mid-range tint
      #A6A08D / #6E6658 (hard offset shadow #2E2A22)
    terrain/snow #EDE8DC (+ #F7F4EC / #D9D2C0) · terrain/grass #9CAD5E · ground #DCCB9C
-->

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4EEDD"/>
    <stop offset="55%" stop-color="#EDE0B8"/>
    <stop offset="100%" stop-color="#E8C888"/>
  </linearGradient>
  <clipPath id="eyeClipL"><circle cx="502.7" cy="1508.0" r="24.9"/></clipPath>
  <clipPath id="eyeClipR"><circle cx="577.3" cy="1508.0" r="24.9"/></clipPath>
</defs>

<!-- Background, full bleed -->
<rect x="0" y="0" width="1024" height="700" fill="url(#sky)"/>
<rect x="0" y="660" width="1024" height="364" fill="#DCCB9C"/>

<!-- ===================== Mountain band — Cover D's aura/back-range/hidden-stub/
     waypoint-pin/Ember-Spire/mid-range block, copied verbatim (every inner
     group and coordinate unchanged) and wrapped in one outer transform. ===== -->
<g transform="translate(-38.8,8.4) scale(1.02,0.68)">

  <!-- Reward-gold aura behind Ember Spire (flat opacity steps, never a gradient) -->
  <circle cx="540" cy="620" r="270" fill="#D6A64B" opacity="0.14"/>
  <circle cx="540" cy="620" r="205" fill="#D6A64B" opacity="0.22"/>
  <circle cx="540" cy="620" r="145" fill="#D6A64B" opacity="0.32"/>
  <circle cx="540" cy="620" r="90"  fill="#D6A64B" opacity="0.5"/>

  <!-- Back range (distant, lightened tint) -->
  <g transform="translate(0,-140)">
    <path d="M150 850 L280 1010 L20 1010 Z" fill="#C9C4B0"/>
    <path d="M150 850 L150 1010 L20 1010 Z" fill="#C9C4B0"/>
    <path d="M150 850 L280 1010 L150 1010 Z" fill="#9B9683"/>
    <path d="M380 800 L530 1010 L230 1010 Z" fill="#C9C4B0"/>
    <path d="M380 800 L380 1010 L230 1010 Z" fill="#C9C4B0"/>
    <path d="M380 800 L530 1010 L380 1010 Z" fill="#9B9683"/>
    <path d="M650 820 L790 1010 L510 1010 Z" fill="#C9C4B0"/>
    <path d="M650 820 L650 1010 L510 1010 Z" fill="#C9C4B0"/>
    <path d="M650 820 L790 1010 L650 1010 Z" fill="#9B9683"/>
    <path d="M900 850 L1020 1010 L780 1010 Z" fill="#C9C4B0"/>
    <path d="M900 850 L900 1010 L780 1010 Z" fill="#C9C4B0"/>
    <path d="M900 850 L1020 1010 L900 1010 Z" fill="#9B9683"/>
  </g>

  <!-- Trek path — hidden TOP STUB, tucks behind Ember Spire (drawn before the
       mountain so it's occluded); the visible connector below picks up from
       this same exit point after the outer transform, so continuity holds. -->
  <path d="M710 655 C 662 612 602 545 548 468"
        fill="none" stroke="#37342B" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="8 6"/>

  <!-- Unnamed waypoint pin — drawn BEHIND Ember Spire, tip hidden, ring + head
       peek from the peak's upper-left flank. §07.8 anatomy, unlabeled. -->
  <g transform="translate(-88,78)">
    <circle cx="560" cy="420" r="34" fill="none" stroke="#D6A64B" stroke-width="6"/>
    <path d="M560 472 C 560 472 528 442 528 420 A32 32 0 1 1 592 420 C 592 442 560 472 560 472 Z"
          fill="#37342B" transform="translate(4,5)"/>
    <path d="M560 472 C 560 472 528 442 528 420 A32 32 0 1 1 592 420 C 592 442 560 472 560 472 Z"
          fill="#5B8A4B" stroke="#37342B" stroke-width="3"/>
    <circle cx="560" cy="420" r="7" fill="#F4EEDD"/>
  </g>

  <!-- Ember Spire — the destination peak -->
  <g>
    <path d="M552 432 L782 912 L322 912 Z" fill="#2E2A22"/>
    <path d="M540 420 L540 900 L310 900 Z" fill="#A6A08D"/>
    <path d="M540 420 L770 900 L540 900 Z" fill="#6E6658"/>
    <path d="M540 420 L540 580 L434 580 Z" fill="#F7F4EC"/>
    <path d="M540 420 L646 580 L540 580 Z" fill="#D9D2C0"/>
  </g>

  <!-- Mid range (flanking Ember Spire) -->
  <g transform="translate(0,-140)">
    <path d="M112 942 L262 1082 L-38 1082 Z" fill="#7C765F"/>
    <path d="M100 930 L250 1080 L-50 1080 Z" fill="#A6A08D"/>
    <path d="M100 930 L100 1080 L-50 1080 Z" fill="#A6A08D"/>
    <path d="M100 930 L250 1080 L100 1080 Z" fill="#6E6658"/>
    <path d="M312 782 L472 1092 L152 1092 Z" fill="#7C765F"/>
    <path d="M300 770 L460 1080 L140 1080 Z" fill="#A6A08D"/>
    <path d="M300 770 L300 1080 L140 1080 Z" fill="#A6A08D"/>
    <path d="M300 770 L460 1080 L300 1080 Z" fill="#6E6658"/>
    <path d="M772 802 L922 1092 L622 1092 Z" fill="#7C765F"/>
    <path d="M760 790 L910 1080 L610 1080 Z" fill="#A6A08D"/>
    <path d="M760 790 L760 1080 L610 1080 Z" fill="#A6A08D"/>
    <path d="M760 790 L910 1080 L760 1080 Z" fill="#6E6658"/>
    <path d="M942 942 L1092 1082 L792 1082 Z" fill="#7C765F"/>
    <path d="M930 930 L1080 1080 L780 1080 Z" fill="#A6A08D"/>
    <path d="M930 930 L930 1080 L780 1080 Z" fill="#A6A08D"/>
    <path d="M930 930 L1080 1080 L930 1080 Z" fill="#6E6658"/>
  </g>
</g>

<!-- Foreground grass wash under Wren (B's band, verbatim), riding the same
     transform as Wren so it stays glued to his feet -->
<g transform="translate(198.8,-121.7) scale(0.58)">
  <path d="M-40 2160 L-40 1780 C 260 1700 460 1820 540 1780 C 680 1720 880 1700 1120 1790 L1120 2160 Z"
        fill="#9CAD5E" opacity="0.4"/>
</g>

<!-- Trek path connector — the ONE hand-redrawn element (see top comment):
     starts exactly at the mountain band's occluded-stub exit point (transformed
     700,650 -> 675,450), ends at Wren's (rescaled) collar (transformed 502,1740
     -> 490,887.5), same switchback dot-dash character as Cover D, compressed to
     three bends to fit the shorter square drop. -->
<path d="M675 450
         C 700 490 690 530 660 550
         C 630 570 590 560 570 590
         C 550 620 575 655 600 675
         C 625 695 600 730 575 750
         C 550 770 565 800 545 820
         C 525 840 500 860 490 887.5"
      fill="none" stroke="#37342B" stroke-width="3" stroke-linecap="round"
      stroke-dasharray="8 6"/>

<!-- ===================== Wren — copied verbatim from Cover D/B, same rig,
     same calm standing pose, wrapped in the Wren-band transform. ===== -->
<g transform="translate(198.8,-121.7) scale(0.58)">
  <!-- ground contact shadow -->
  <ellipse cx="540" cy="1850.2" rx="115.1" ry="28" fill="#37342B" opacity="0.18"/>

  <!-- 1 · feet -->
  <g>
    <rect x="459.1" y="1738.2" width="74.7" height="118.2" rx="34.2" fill="#D8B58C"/>
    <path d="M459.1 1738.2 L533.8 1738.2 L533.8 1783 L459.1 1808 Z" fill="#E6CBA6"/>
    <path d="M533.8 1856.4 L459.1 1856.4 L459.1 1815 L533.8 1793 Z" fill="#BE9A6E"/>
    <rect x="546.2" y="1738.2" width="74.7" height="118.2" rx="34.2" fill="#D8B58C"/>
    <path d="M546.2 1738.2 L620.9 1738.2 L620.9 1783 L546.2 1808 Z" fill="#E6CBA6"/>
    <path d="M620.9 1856.4 L546.2 1856.4 L546.2 1815 L620.9 1793 Z" fill="#BE9A6E"/>
  </g>

  <!-- 2 · back arm -->
  <g transform="rotate(8 409.3 1626.2)">
    <rect x="368.9" y="1539.1" width="80.9" height="174.2" rx="40.4" fill="#5F6B4D"/>
    <path d="M368.9 1539.1 L449.8 1539.1 L449.8 1580 L368.9 1620 Z" fill="#74815F"/>
    <path d="M449.8 1713.3 L368.9 1713.3 L368.9 1672 L449.8 1632 Z" fill="#4A543C"/>
  </g>

  <!-- 3 · staff -->
  <g transform="rotate(-4 667.5 1588.9)">
    <rect x="655.1" y="1355.5" width="24.9" height="466.7" rx="12.4" fill="#5F6B4D"/>
  </g>
  <circle cx="676.9" cy="1364.9" r="23.3" fill="#5F6B4D"/>
  <path d="M676.9 1341.6 a23.3 23.3 0 0 1 0 46.6 Z" fill="#74815F"/>

  <!-- 4 · pack -->
  <rect x="381.3" y="1486.2" width="105.8" height="130.7" rx="37.3" fill="#5F6B4D"/>
  <path d="M381.3 1486.2 L487.1 1486.2 L487.1 1530 L381.3 1560 Z" fill="#74815F"/>

  <!-- 5 · body (cloak) -->
  <rect x="400" y="1551.5" width="280" height="211.5" rx="62.2" fill="#5F6B4D"/>
  <path d="M400 1551.5 L680 1551.5 L680 1610 L400 1660 Z" fill="#74815F"/>
  <path d="M680 1763 L400 1763 L400 1710 L680 1660 Z" fill="#4A543C"/>

  <!-- 6 · belt -->
  <rect x="400" y="1675.9" width="280" height="24.9" rx="12.4" fill="#37342B"/>

  <!-- 7 · ears -->
  <circle cx="446.7" cy="1495.5" r="24.9" fill="#D8B58C"/>
  <circle cx="633.3" cy="1495.5" r="24.9" fill="#D8B58C"/>

  <!-- 8 · face -->
  <circle cx="540" cy="1483.1" r="93.3" fill="#D8B58C"/>
  <path d="M540 1389.8 A93.3 93.3 0 0 0 456.4 1518 L540 1483.1 Z" fill="#E6CBA6"/>
  <path d="M540 1576.4 A93.3 93.3 0 0 0 611.7 1451 L540 1483.1 Z" fill="#BE9A6E"/>

  <!-- 9 · hair (bare curly crown, faceted circles) -->
  <g>
    <circle cx="540" cy="1371.1" r="34.2" fill="#8B5A34"/>
    <circle cx="484" cy="1377.3" r="31.1" fill="#8B5A34"/>
    <circle cx="596" cy="1377.3" r="31.1" fill="#8B5A34"/>
    <circle cx="440.4" cy="1408.4" r="29.6" fill="#8B5A34"/>
    <circle cx="639.6" cy="1408.4" r="29.6" fill="#8B5A34"/>
    <circle cx="515.1" cy="1402.2" r="28.0" fill="#8B5A34"/>
    <circle cx="564.9" cy="1402.2" r="28.0" fill="#8B5A34"/>
    <circle cx="540" cy="1414.7" r="26.4" fill="#8B5A34"/>
    <circle cx="465.3" cy="1433.3" r="23.3" fill="#8B5A34"/>
    <circle cx="508.9" cy="1433.3" r="23.3" fill="#8B5A34"/>
    <circle cx="552.4" cy="1433.3" r="23.3" fill="#8B5A34"/>
    <circle cx="596" cy="1433.3" r="23.3" fill="#8B5A34"/>
    <g fill="#A47245" opacity="0.6">
      <circle cx="530" cy="1362" r="10"/>
      <circle cx="474" cy="1368" r="9"/>
      <circle cx="430" cy="1400" r="8"/>
      <circle cx="505" cy="1394" r="7.5"/>
    </g>
  </g>

  <!-- 10 · eyes -->
  <g clip-path="url(#eyeClipL)">
    <circle cx="502.7" cy="1508.0" r="24.9" fill="#F4EEDD"/>
    <circle cx="502.7" cy="1501.8" r="10.9" fill="#37342B"/>
    <path d="M477.8 1532.9 L477.8 1519.9 Q502.7 1508.5 527.6 1519.9 L527.6 1532.9 Z" fill="#D8B58C"/>
  </g>
  <g clip-path="url(#eyeClipR)">
    <circle cx="577.3" cy="1508.0" r="24.9" fill="#F4EEDD"/>
    <circle cx="577.3" cy="1501.8" r="10.9" fill="#37342B"/>
    <path d="M552.4 1532.9 L552.4 1519.9 Q577.3 1508.5 602.2 1519.9 L602.2 1532.9 Z" fill="#D8B58C"/>
  </g>

  <!-- 11 · eyebrows (calm/walking: soft-raised, gentle) -->
  <rect x="471.6" y="1462.9" width="62.2" height="15.6" rx="7.8" fill="#37342B" transform="rotate(-6 502.7 1470.7)"/>
  <rect x="546.2" y="1462.9" width="62.2" height="15.6" rx="7.8" fill="#37342B" transform="rotate(6 577.3 1470.7)"/>
</g>

<!-- ===================== Masthead — weave trail + wordmark only, verbatim
     from Cover D (tagline DROPPED per brief; "an icon is a mark"). ===== -->
<g transform="translate(53,-17) scale(0.85)">
  <path d="M92 208
           C132 208 170 112 214 112
           C260 112 286 266 324 266
           C366 266 422 146 458 146
           C488 146 514 210 540 210
           C576 210 620 134 652 134
           C690 134 722 210 756 210
           C788 210 810 146 838 146
           C868 146 900 184 922 168"
        fill="none" stroke="#37342B" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
  <text x="540" y="225" font-family="Georgia,'Times New Roman',serif" font-weight="700"
        font-size="90" fill="#37342B" text-anchor="middle">JourneyTracker</text>
</g>

</svg>
