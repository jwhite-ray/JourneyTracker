<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2160" width="1080" height="2160">
<!--
  KAN-29 · Cover concept D — "Composite" (user-directed merge of A + B)
  Bottom half = Cover B's Wren hero figure, copied at identical scale/coordinates
  (same shipped WrenMarker rig, calm standing pose, on grass). Top half = Cover A's
  mountain vista, restored verbatim (per user feedback on the first composite pass):
  the full back range (4 distant peaks), the snow-capped Ember Spire nestled in the
  back-center reading as the farthest/tallest silhouette, and the mid range of 4
  peaks flanking the Spire, plus its gold aura and lower-slope conifer scatter — all
  copied at A's exact relative positions/scale/tints, just shifted up (translate
  0,-140) to fit the composite's shorter top half above Wren's stage. The ONLY
  mountain content cut from A is the darker FRONT range (the two foreground
  triangle clusters that overlapped/sat in front of the lighter peaks) — per
  feedback, the distant Ember Spire reads more real staying in the back, not
  brought forward or enlarged. An UNNAMED waypoint pin sticks up from directly
  behind the Spire's apex (no name chip — the "EMBER SPIRE" chip from A stays
  removed), tip hidden by the peak, ring + head peeking above/behind the summit.
  A single dot-dash trek path continues from the vista down through the midground
  to Wren's feet. In the masthead, the trail weaves behind "JourneyTracker" tracing
  a specific hand-drawn contour (tall hump over "Jo", a deep valley below the
  baseline through "ourn/ourney", back up over "ey", down between "y/T", up over
  "Tr", a shallower dip through "ac", up over "k", then rising off-frame past "er")
  instead of a uniform sine weave — kept clear of the (slightly lowered) tagline.

  Token → hex map (see docs/DESIGN_SYSTEM.md §02/§04/§07 for the source tokens
  this traces to; static SVG can't bind runtime tokens):
    bg/parchment #E8DEC0 · surface/card #F4EEDD · ink #37342B
    accent/primary #5B8A4B · accent/reward #D6A64B
    char/cloak #5F6B4D (+ #74815F / #4A543C) · char/skin #D8B58C (+ #E6CBA6 / #BE9A6E)
    char/hair #8B5A34 (+ #A47245)
    terrain/stone #8C8574, back-range "distant" tint #C9C4B0 / #9B9683, mid-range
      tint #A6A08D / #6E6658 (hard offset shadow #2E2A22), Ember Spire same tint family
    terrain/snow #EDE8DC (+ #F7F4EC / #D9D2C0) · terrain/forest #3F6B3C (+ #4F7F4B / #2E4F2B)
    terrain/grass #9CAD5E · ground #DCCB9C

  Judgment calls made in this revision (documented, not silent):
   - Restored A's back range + mid range + Ember Spire + aura + conifers as one
     verbatim block (uniform translate(0,-140), no rescale) rather than the
     previous pass's redrawn/simplified peak — this reproduces A's positions and
     tints exactly, per feedback to make it "read like the first rendering."
   - Only the front range (A's two darkest foreground triangle clusters) is
     omitted; nothing else from A's vista is cut except the elements that were
     already dropped for the composite (A's own foreground mound + its foreground
     conifer texture), which stay dropped because that ground is Wren's stage —
     the brief's "trim only the lowest foreground elements that would collide
     with Wren" note.
   - The waypoint pin keeps its unnamed, chip-less, "peeking from behind the
     apex" treatment from the prior D pass (this was correct per feedback) —
     only its coordinates moved to track Ember Spire's restored apex position.
   - The mountain-to-Wren trek path is left as-is; its start point already lands
     within a few px of the restored mid range's right-hand peak apex, so no
     geometry change was needed for it to keep reading as one continuous trail.
   - Title-weave path is entirely retraced by hand to the specific contour
     requested (uneven arch/valley heights, not a regular sine), and the tagline
     is nudged down (270/306 → 302/338, copy unchanged) so the weave's deepest
     valley (y=260) clears the tagline's top edge with margin.
-->

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4EEDD"/>
    <stop offset="55%" stop-color="#EDE0B8"/>
    <stop offset="100%" stop-color="#E8C888"/>
  </linearGradient>
  <clipPath id="eyeClipL"><circle cx="502.7" cy="1508.0" r="24.9"/></clipPath>
  <clipPath id="eyeClipR"><circle cx="577.3" cy="1508.0" r="24.9"/></clipPath>
</defs>

